name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform_name }} installer
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_name: Windows
            artifact_name: windows-installer
            artifact_path: |
              dist/*.exe
              dist/*.blockmap
              dist/latest.yml
          - os: macos-latest
            platform_name: macOS Apple Silicon
            artifact_name: macos-arm64-installer
            npm_command: npm run dist -- --mac dmg --arm64
            artifact_path: |
              dist/*.dmg
              dist/*.blockmap
              dist/latest-mac.yml
          - os: macos-13
            platform_name: macOS Intel
            artifact_name: macos-x64-installer
            npm_command: npm run dist -- --mac dmg --x64
            artifact_path: |
              dist/*.dmg
              dist/*.blockmap
              dist/latest-mac.yml

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build installer
        shell: bash
        run: ${{ matrix.npm_command || 'npm run dist' }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

      - name: Publish files to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_path }}
